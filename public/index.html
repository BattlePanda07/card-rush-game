<!DOCTYPE html>
<html>
<head>
  <title>Card Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
.card {
  min-width: 100px;
  height: 70px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  border-radius:14px;
  background:white;
  color:black;
  box-shadow:0 6px 18px rgba(0,0,0,0.4);
  transition:0.15s;
}

.card:active {
  transform: scale(0.92);
}

.hand {
  gap: 10px;
  padding: 12px;
  overflow-x: auto;
}
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #0b1220;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: #111827;
      position: sticky;
      top: 0;
    }

    .room {
      color: #38bdf8;
      font-weight: 700;
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .game {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
    }

    .panel {
      background: #1f2937;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .btn {
      background: #2563eb;
      border: none;
      color: white;
      padding: 8px 10px;
      border-radius: 10px;
      margin: 4px;
    }

    .hand {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 10px;
      background: #0f172a;
      border-top: 1px solid #1f2937;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .card {
      min-width: 90px;
      background: white;
      color: black;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      text-align: center;
      cursor: pointer;
      user-select: none;
    }

    .card:active {
      transform: scale(0.95);
    }

    input {
      padding: 8px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>

<body>

<div class="layout">

  <div class="topbar">
    <div>🎴 Card Game</div>
    <div class="room" id="room"></div>
  </div>

  <div class="game">

    <div id="lobby" class="panel">
      <button class="btn" onclick="createRoom()">Create Room</button>
      <br><br>
      <input id="code" placeholder="Enter code" />
      <button class="btn" onclick="joinRoom()">Join</button>
    </div>

    <div id="board"></div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>

</body>
</html>
